name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "24"

defaults:
  run:
    shell: bash

jobs:
  frontend:
    name: Frontend Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run frontend unit tests
        working-directory: apps/web
        run: npm test

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

  # ── Lint & Build ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check Go formatting
        working-directory: backend
        run: |
          test -z "$(gofmt -l .)"

      - name: Run go vet
        working-directory: backend
        run: go vet ./...
  # ── Unit & Integration Tests ──────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: travel
          POSTGRES_PASSWORD: travel
          POSTGRES_DB: travel_planner_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U travel -d travel_planner_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: travel
          DB_PASSWORD: travel
          DB_NAME: travel_planner_test
          DB_SSLMODE: disable
          REDIS_ADDR: localhost:6379
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.out

  # ── Migration Smoke Test ──────────────────────────────────
  migration:
    name: Migration Smoke Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: travel
          POSTGRES_PASSWORD: travel
          POSTGRES_DB: travel_planner_migrate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U travel -d travel_planner_migrate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Migrate up
        run: |
          migrate -path backend/migrations \
            -database "postgres://travel:travel@localhost:5432/travel_planner_migrate?sslmode=disable" \
            up

      - name: Migrate down (rollback all)
        run: |
          migrate -path backend/migrations \
            -database "postgres://travel:travel@localhost:5432/travel_planner_migrate?sslmode=disable" \
            down -all

      - name: Migrate up again (idempotency check)
        run: |
          migrate -path backend/migrations \
            -database "postgres://travel:travel@localhost:5432/travel_planner_migrate?sslmode=disable" \
            up
  build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build all binaries
        working-directory: backend
        run: |
          go build -o /dev/null ./cmd/api
          go build -o /dev/null ./cmd/worker
