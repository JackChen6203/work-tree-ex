name: CI

on:
  push:
    branches: [main, develop, frontend]
    tags: ["v*"]
  pull_request:
    branches: [main, develop, frontend]

env:
  GO_VERSION: "1.25.0"
  NODE_VERSION: "24"

defaults:
  run:
    shell: bash

jobs:
  frontend:
    name: Frontend Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run frontend unit tests
        working-directory: apps/web
        run: npm test

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

  # ── Lint & Build ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Check Go formatting
        working-directory: backend
        run: |
          test -z "$(gofmt -l .)"

      - name: Run golangci-lint
        working-directory: backend
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          "$(go env GOPATH)/bin/golangci-lint" run ./... \
            --disable-all \
            --enable=govet \
            --enable=staticcheck \
            --enable=ineffassign \
            --enable=errcheck

      - name: Run go vet
        working-directory: backend
        run: go vet ./...
  # ── Unit & Integration Tests ──────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: travel
          POSTGRES_PASSWORD: travel
          POSTGRES_DB: travel_planner_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U travel -d travel_planner_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: travel
          DB_PASSWORD: travel
          DB_NAME: travel_planner_test
          DB_SSLMODE: disable
          REDIS_ADDR: localhost:6379
        run: ./scripts/test-backend.sh -v -race -count=1 -coverprofile=coverage.out

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.out

  # ── Migration Smoke Test ──────────────────────────────────
  migration:
    name: Migration Smoke Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: travel
          POSTGRES_PASSWORD: travel
          POSTGRES_DB: travel_planner_migrate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U travel -d travel_planner_migrate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Migrate up
        env:
          MIGRATE_DATABASE_URL: postgres://travel:travel@localhost:5432/travel_planner_migrate?sslmode=disable
        run: |
          ./scripts/migrate.sh up

      - name: Migrate rollback (all)
        env:
          MIGRATE_DATABASE_URL: postgres://travel:travel@localhost:5432/travel_planner_migrate?sslmode=disable
        run: |
          ./scripts/migrate-rollback.sh

      - name: Migrate up again (idempotency check)
        env:
          MIGRATE_DATABASE_URL: postgres://travel:travel@localhost:5432/travel_planner_migrate?sslmode=disable
        run: |
          ./scripts/migrate.sh up
  build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Build all binaries
        working-directory: backend
        run: |
          go build -o /dev/null ./cmd/api
          go build -o /dev/null ./cmd/worker

  docker-backend:
    name: Backend Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, migration, build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/work-tree-ex-backend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
