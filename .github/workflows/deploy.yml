name: Deploy

on:
  push:
    branches: [main]

env:
  DEPLOY_PATH: /home/opc/apps/work-tree-ex
  DEPLOY_HOST: 217.142.247.83
  DEPLOY_USER: opc

jobs:
  verify-frontend:
    name: Verify Frontend Before Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run frontend tests
        working-directory: apps/web
        run: npm test

      - name: Run frontend lint
        working-directory: apps/web
        run: npm run lint

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run frontend e2e
        working-directory: apps/web
        run: npm run e2e

  migrate-production:
    name: Run Production Migrations
    runs-on: ubuntu-latest
    needs: verify-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations against Supabase
        env:
          MIGRATE_DATABASE_URL: ${{ secrets.MIGRATE_DATABASE_URL }}
        run: |
          test -n "$MIGRATE_DATABASE_URL"
          ./scripts/migrate.sh up

  deploy:
    name: Deploy To Oracle VPS
    runs-on: ubuntu-latest
    needs:
      - verify-frontend
      - migrate-production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Write deploy SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle_vps_key
          chmod 600 ~/.ssh/oracle_vps_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Verify SSH access
        run: |
          ssh -i ~/.ssh/oracle_vps_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "echo connected"

      - name: Sync repository on server
        run: |
          ssh -i ~/.ssh/oracle_vps_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "
            mkdir -p ${{ env.DEPLOY_PATH }} &&
            if [ ! -d ${{ env.DEPLOY_PATH }}/.git ]; then
              git clone https://github.com/JackChen6203/work-tree-ex.git ${{ env.DEPLOY_PATH }};
            else
              cd ${{ env.DEPLOY_PATH }} &&
              git fetch --all --prune &&
              git reset --hard origin/main;
            fi
          "

      - name: Write server env file
        run: |
          ssh -i ~/.ssh/oracle_vps_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}"
          ssh -i ~/.ssh/oracle_vps_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "cat > ${{ env.DEPLOY_PATH }}/.env" <<'EOF'
          ${{ secrets.APP_ENV_FILE }}
          EOF

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/oracle_vps_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "cd ${{ env.DEPLOY_PATH }} && docker compose pull || true && docker compose up -d --build redis api worker web"
