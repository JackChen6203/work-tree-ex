services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────
  postgres:
    image: ${POSTGRES_IMAGE:-imresamu/postgis:16-3.4.4-alpine3.21}
    container_name: travel-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-travel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-travel}
      POSTGRES_DB: ${DB_NAME:-travel_planner}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-travel} -d ${DB_NAME:-travel_planner}"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles:
      - local-db

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: travel-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Database Migrations ───────────────────────────────────
  migrate:
    image: migrate/migrate:v4.17.0
    container_name: travel-migrate
    volumes:
      - ./backend/migrations:/migrations
    command: >
      -path=/migrations
      -database=${MIGRATE_DATABASE_URL:-postgres://${DB_USER:-travel}:${DB_PASSWORD:-travel}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-travel_planner}?sslmode=${DB_SSLMODE:-disable}}
      up
    profiles:
      - tools

  # ── API Server ────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    container_name: travel-api
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      TRIPS_STORE: ${TRIPS_STORE:-postgres}
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8080"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-travel}
      DB_PASSWORD: ${DB_PASSWORD:-travel}
      DB_NAME: ${DB_NAME:-travel_planner}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ACCESS_TTL_MIN: ${JWT_ACCESS_TTL_MIN:-60}
      JWT_REFRESH_TTL_HOURS: ${JWT_REFRESH_TTL_HOURS:-168}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_APPLE_CLIENT_ID: ${OAUTH_APPLE_CLIENT_ID:-}
      OAUTH_FACEBOOK_CLIENT_ID: ${OAUTH_FACEBOOK_CLIENT_ID:-}
      OAUTH_X_CLIENT_ID: ${OAUTH_X_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      OAUTH_LINE_CLIENT_ID: ${OAUTH_LINE_CLIENT_ID:-}
      OAUTH_KAKAO_CLIENT_ID: ${OAUTH_KAKAO_CLIENT_ID:-}
      OAUTH_WECHAT_CLIENT_ID: ${OAUTH_WECHAT_CLIENT_ID:-}
      OAUTH_TRIPADVISOR_CLIENT_ID: ${OAUTH_TRIPADVISOR_CLIENT_ID:-}
      OAUTH_BOOKING_CLIENT_ID: ${OAUTH_BOOKING_CLIENT_ID:-}
    restart: unless-stopped

  # ── Worker ────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    container_name: travel-worker
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      TRIPS_STORE: ${TRIPS_STORE:-postgres}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-travel}
      DB_PASSWORD: ${DB_PASSWORD:-travel}
      DB_NAME: ${DB_NAME:-travel_planner}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ACCESS_TTL_MIN: ${JWT_ACCESS_TTL_MIN:-60}
      JWT_REFRESH_TTL_HOURS: ${JWT_REFRESH_TTL_HOURS:-168}
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: travel-web
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped

volumes:
  postgres_data:
