services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────
  postgres:
    image: ${POSTGRES_IMAGE:-imresamu/postgis:16-3.4.4-alpine3.21}
    container_name: travel-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-travel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-travel}
      POSTGRES_DB: ${DB_NAME:-travel_planner}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-travel} -d ${DB_NAME:-travel_planner}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: travel-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Database Migrations ───────────────────────────────────
  migrate:
    image: migrate/migrate:v4.17.0
    container_name: travel-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${DB_USER:-travel}:${DB_PASSWORD:-travel}@postgres:5432/${DB_NAME:-travel_planner}?sslmode=disable
      up
    profiles:
      - tools

  # ── API Server ────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    container_name: travel-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      TRIPS_STORE: ${TRIPS_STORE:-postgres}
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8080"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-travel}
      DB_PASSWORD: ${DB_PASSWORD:-travel}
      DB_NAME: ${DB_NAME:-travel_planner}
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
    restart: unless-stopped

  # ── Worker ────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    container_name: travel-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      TRIPS_STORE: ${TRIPS_STORE:-postgres}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-travel}
      DB_PASSWORD: ${DB_PASSWORD:-travel}
      DB_NAME: ${DB_NAME:-travel_planner}
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: travel-web
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  postgres_data:
