server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /sw.js {
    default_type application/javascript;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    return 200 'self.addEventListener("install",event=>event.waitUntil(self.skipWaiting()));self.addEventListener("activate",event=>event.waitUntil((async()=>{const keys=await caches.keys();await Promise.all(keys.map(key=>caches.delete(key)));await self.registration.unregister();const clients=await self.clients.matchAll({type:"window",includeUncontrolled:true});clients.forEach(client=>client.navigate(client.url));})()));';
  }

  location = /registerSW.js {
    default_type application/javascript;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    return 200 '';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://api:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  location /healthz {
    proxy_pass http://api:8080/healthz;
  }
}
